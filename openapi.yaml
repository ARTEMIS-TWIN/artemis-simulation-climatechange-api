openapi: 3.1.0
info:
  title: ARTEMIS Python Microservices API Catalog
  version: 1.1.0
  description: Aggregated OpenAPI catalog generated from the attached FastAPI applications. The prefixed paths are documentation
    namespaces. For interactive calls against the running services, select the corresponding individual service specification
    from the Swagger UI dropdown.
servers:
- url: http://10.0.4.10
  description: ARTEMIS development VM; individual services use ports 8101-8106
- url: http://localhost
  description: Local documentation context
tags:
- name: ClimateRag
  description: PDF processing, GROBID extraction, embeddings and RAG answer generation.
- name: FutureClimate
  description: CMIP6 climate values and climate-derived heritage, bioclimatic and tourism indices.
- name: RandomGen
  description: Stateless sampling from probability distributions.
- name: SensorCluster
  description: Stateless simulation of a network of sensors and event vectors.
- name: SingleSensor
  description: Stateless simulation of one sensor reading or a sequence of readings.
- name: SurfaceTemp
  description: OBJ model upload, model registry, face-debug extraction and surface-temperature simulation for Unity.
paths:
