          anyOf:
          - type: number
            maximum: 12.0
            minimum: 1.0
          - type: 'null'
          title: Linke Turbidity
          description: Optional Linke turbidity. If omitted, pvlib lookup/default is used.
        albedo:
          type: number
          maximum: 1.0
          minimum: 0.0
          title: Albedo
          description: Ground reflectance used for reflected radiation.
          default: 0.2
        use_ground_reflected:
          type: boolean
